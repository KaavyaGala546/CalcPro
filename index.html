<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcPro - Modern Scientific Calculator</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="controls">
        <button id="theme-toggle" class="toggle-btn">Switch to Light Mode</button>
        <button id="scientific-toggle" class="toggle-btn">Scientific Mode</button>
        <button id="converter-toggle" class="toggle-btn">Converter</button>
        <button id="history-toggle" class="toggle-btn">History</button>
    </div>
    <div class="container">
        <div class="calculator">
        <input type="text" class="value" readonly>

        <div class="scientific-keys">
            <button class="num sci" data-button="sin("><i>sin</i></button>
            <button class="num sci" data-button="cos("><i>cos</i></button>
            <button class="num sci" data-button="tan("><i>tan</i></button>
            <button class="num sci" data-button="log10("><i>log</i></button>
            <button class="num sci" data-button="PI"><i>π</i></button>
            <button class="num sci" data-button="E"><i>e</i></button>
            <button class="num sci" data-button="^"><i>x<sup>y</sup></i></button>
            <button class="num sci" data-button="sqrt("><i>√</i></button>
            <button class="num sci" data-button="("><i>(</i></button>
            <button class="num sci" data-button=")"><i>)</i></button>
        </div>

        <button class="num clear" data-button="C"><i>C</i></button>
        <button class="num" data-button="CE"><i>CE</i></button>
        <button class="num" data-button="/"><i>/</i></button>
        <button class="num" data-button="*"><i>*</i></button>

        <button class="num" data-button="7"><i>7</i></button>
        <button class="num" data-button="8"><i>8</i></button>
        <button class="num" data-button="9"><i>9</i></button>
        <button class="num" data-button="-"><i>-</i></button>

        <button class="num" data-button="4"><i>4</i></button>
        <button class="num" data-button="5"><i>5</i></button>
        <button class="num" data-button="6"><i>6</i></button>
        <button class="num" data-button="+"><i>+</i></button>

        <button class="num" data-button="1"><i>1</i></button>
        <button class="num" data-button="2"><i>2</i></button>
        <button class="num" data-button="3"><i>3</i></button>
        <button class="num equal" data-button="="><i>=</i></button>

        <button class="num" data-button="0"><i>0</i></button>
        <button class="num" data-button="00"><i>00</i></button>
        <button class="num" data-button="."><i>.</i></button>

        <div id="history-list" class="history-panel">
            <h3>History <button id="clear-history">Clear</button></h3>
            <ul id="history-items"></ul>
        </div>
        </div>
        </div>

        <div class="converter-panel">
            <h3><i class="fas fa-exchange-alt"></i> Unit Converter</h3>
            <div class="converter-grid">
                <select id="convert-type">
                    <option value="length">Length</option>
                    <option value="weight">Weight</option>
                    <option value="temp">Temperature</option>
                </select>
                <div class="convert-inputs">
                    <input type="number" id="convert-from-val" placeholder="Value">
                    <select id="convert-from-unit"></select>
                </div>
                <div class="convert-to">
                    <span id="convert-res">0</span>
                    <select id="convert-to-unit"></select>
                </div>
            </div>
        </div>

        <script type="module" src="src/js/script.js"></script>
</body>
</html>
